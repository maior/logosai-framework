<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d97706"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ef4444"/></marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/></marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">LogosAI — System Architecture</text>
  <text x="440" y="50" text-anchor="middle" fill="#64748b" font-size="10">Ontology-Based Multi-Agent AI System</text>

  <!-- ═══ Layer 1: User ═══ -->
  <rect x="350" y="64" width="180" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="440" y="86" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">💬 Natural Language Query</text>
  <line x1="440" y1="100" x2="440" y2="122" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ═══ Layer 2: Frontend ═══ -->
  <rect x="20" y="115" width="840" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="133" fill="#64748b" font-size="9" font-weight="600">FRONTEND</text>
  <rect x="340" y="127" width="200" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="440" y="146" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">🌐 logos_web :8010</text>
  <text x="440" y="155" text-anchor="middle" fill="#64748b" font-size="7">Next.js 14 · SSE streaming · Google OAuth</text>

  <!-- Arrow: Frontend → API -->
  <line x1="440" y1="157" x2="440" y2="185" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="455" y="174" fill="#8b5cf6" font-size="8">HTTP / SSE</text>

  <!-- ═══ Layer 3: API ═══ -->
  <rect x="20" y="180" width="840" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="198" fill="#64748b" font-size="9" font-weight="600">API</text>
  <rect x="260" y="192" width="360" height="38" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="440" y="210" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">⚡ logos_api :8090</text>
  <text x="440" y="224" text-anchor="middle" fill="#64748b" font-size="8">FastAPI · JWT + X-User-Email · User Memory · Conversation · Telegram Bot · Desktop Routing</text>

  <!-- Arrow: API → Orchestration -->
  <path d="M350,230 C300,255 200,260 190,275" fill="none" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="250" y="256" fill="#8b5cf6" font-size="8">select agents</text>
  <path d="M440,230 C440,255 430,260 430,275" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="450" y="258" fill="#10b981" font-size="8">JSON-RPC / SSE</text>

  <!-- ═══ Layer 4: Orchestration ═══ -->
  <rect x="20" y="268" width="840" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="286" fill="#64748b" font-size="9" font-weight="600">ORCHESTRATION &amp; RUNTIME</text>

  <rect x="60" y="292" width="165" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="142" y="309" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">🧠 Ontology Engine</text>
  <text x="142" y="323" text-anchor="middle" fill="#64748b" font-size="7.5">GNN + RL + KG + LLM · zero hardcoding</text>

  <rect x="260" y="288" width="210" height="44" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="365" y="306" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">🔧 ACP Server :8888</text>
  <text x="365" y="320" text-anchor="middle" fill="#64748b" font-size="8">50+ agents · hot_register · call_agent() · WorkflowEngine</text>

  <rect x="500" y="292" width="155" height="38" rx="6" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="577" y="309" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">📦 logosai SDK</text>
  <text x="577" y="323" text-anchor="middle" fill="#64748b" font-size="7.5">LogosAIAgent · Evolution · LLMClient</text>

  <rect x="680" y="292" width="140" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="750" y="309" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">🗳️ Debate System</text>
  <text x="750" y="323" text-anchor="middle" fill="#64748b" font-size="7.5">5-phase agent negotiation</text>

  <!-- Internal connections -->
  <line x1="225" y1="311" x2="260" y2="311" stroke="#10b981" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="470" y1="311" x2="500" y2="311" stroke="#34d399" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="476" y="307" fill="#34d399" font-size="7">extends</text>

  <!-- Arrow: ACP → Agents -->
  <path d="M300,332 C260,355 180,365 180,378" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M365,332 C365,355 420,365 420,378" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M430,332 C470,355 650,365 650,378" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="310" y="360" fill="#d97706" font-size="8">process(query) — parallel execution</text>

  <!-- ═══ Layer 5: Agents ═══ -->
  <rect x="20" y="372" width="840" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="390" fill="#64748b" font-size="9" font-weight="600">AGENTS (50+)</text>

  <rect x="55" y="392" width="260" height="30" rx="6" fill="#422006" stroke="#d97706" stroke-width="1"/>
  <text x="185" y="410" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🔍 Core Agents (30+)</text>
  <text x="185" y="420" text-anchor="middle" fill="#92400e" font-size="7">internet · analysis · code · RAG · translation · writing · calculator · scheduler</text>

  <rect x="340" y="392" width="240" height="30" rx="6" fill="#422006" stroke="#d97706" stroke-width="1"/>
  <text x="460" y="410" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🖥️ Desktop Agents (5)</text>
  <text x="460" y="420" text-anchor="middle" fill="#92400e" font-size="7">Gmail · KakaoTalk · Notion · WhatsApp · Auto Reports</text>

  <rect x="605" y="392" width="225" height="30" rx="6" fill="#1f2937" stroke="#4b5563" stroke-width="0.8"/>
  <text x="717" y="410" text-anchor="middle" fill="#9ca3af" font-size="9.5" font-weight="600">➕ Auto-generated agents</text>
  <text x="717" y="420" text-anchor="middle" fill="#6b7280" font-size="7">Created on demand via GapDetector + hot_register</text>

  <!-- ═══ Layer 6: Evolution ═══ -->
  <rect x="20" y="448" width="840" height="78" rx="8" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="30" y="466" fill="#fca5a5" font-size="9" font-weight="600">SELF-EVOLUTION (logosai.evolution)</text>

  <rect x="55" y="476" width="150" height="36" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="130" y="493" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">📋 FailureLogger</text>
  <text x="130" y="506" text-anchor="middle" fill="#7f1d1d" font-size="7.5">Auto-trigger at 30% failure</text>

  <rect x="230" y="476" width="140" height="36" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="300" y="493" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">🔍 GapDetector</text>
  <text x="300" y="506" text-anchor="middle" fill="#7f1d1d" font-size="7.5">LLM gap analysis</text>

  <rect x="400" y="476" width="140" height="36" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="470" y="493" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="600">🛡️ Confidence Gate</text>
  <text x="470" y="506" text-anchor="middle" fill="#6b21a8" font-size="7.5">≥0.95 auto / &lt;0.95 review</text>

  <rect x="570" y="476" width="130" height="36" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="635" y="493" text-anchor="middle" fill="#6ee7b7" font-size="9.5" font-weight="600">🚀 hot_register</text>
  <text x="635" y="506" text-anchor="middle" fill="#065f46" font-size="7.5">Zero-downtime deploy</text>

  <rect x="730" y="476" width="100" height="36" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="780" y="497" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">✨ Live!</text>

  <!-- Evolution arrows -->
  <line x1="205" y1="494" x2="230" y2="494" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="370" y1="494" x2="400" y2="494" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <line x1="540" y1="494" x2="570" y2="494" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="700" y1="494" x2="730" y2="494" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Feedback: failure data from agents -->
  <path d="M365,422 C365,445 130,455 130,476" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="220" y="448" fill="#ef4444" font-size="7">failure data</text>

  <!-- hot_register → ACP -->
  <path d="M635,476 C635,460 830,440 830,340 C830,332 470,332 470,332" fill="none" stroke="#10b981" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <text x="760" y="440" fill="#10b981" font-size="7">register agent</text>

  <!-- Dependencies -->
  <text x="30" y="536" fill="#475569" font-size="8.5">
    <tspan font-weight="600" fill="#64748b">External: </tspan>
    <tspan fill="#475569">PostgreSQL · Elasticsearch · Gemini / OpenAI / Anthropic · Tavily · Telegram · macOS Accessibility</tspan>
  </text>
</svg>
