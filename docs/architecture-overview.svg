<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="620" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">LogosAI — System Architecture</text>
  <text x="440" y="50" text-anchor="middle" fill="#64748b" font-size="10">Self-Evolving Multi-Agent AI System</text>

  <!-- ═══ Layer 1: User ═══ -->
  <text x="30" y="80" fill="#64748b" font-size="9" font-weight="600" text-transform="uppercase" letter-spacing="1">USER</text>
  <rect x="350" y="68" width="180" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="440" y="90" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">💬 Natural Language Query</text>

  <!-- Arrow: User → Frontend -->
  <line x1="440" y1="104" x2="440" y2="128" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ═══ Layer 2: Frontend ═══ -->
  <rect x="20" y="118" width="840" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="136" fill="#64748b" font-size="9" font-weight="600">FRONTEND</text>
  <rect x="300" y="130" width="140" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="370" y="149" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">🌐 logos_web</text>
  <text x="370" y="158" text-anchor="middle" fill="#64748b" font-size="7">:8010 Next.js</text>
  <rect x="500" y="130" width="140" height="30" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="570" y="149" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">🏗️ FORGE Web</text>
  <text x="570" y="158" text-anchor="middle" fill="#64748b" font-size="7">:8050 Monaco+D3</text>

  <!-- Arrow: Frontend → API -->
  <line x1="370" y1="160" x2="280" y2="192" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="310" y="178" fill="#8b5cf6" font-size="8">SSE stream</text>
  <line x1="570" y1="160" x2="570" y2="192" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="592" y="178" fill="#d97706" font-size="8">WebSocket</text>

  <!-- ═══ Layer 3: API ═══ -->
  <rect x="20" y="185" width="840" height="62" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="203" fill="#64748b" font-size="9" font-weight="600">API SERVICES</text>
  <rect x="170" y="197" width="170" height="38" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="255" y="214" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">⚡ logos_api</text>
  <text x="255" y="228" text-anchor="middle" fill="#64748b" font-size="8">:8090 FastAPI · JWT · Memory · Telegram</text>
  <rect x="470" y="197" width="170" height="38" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="555" y="214" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">🏗️ FORGE API</text>
  <text x="555" y="228" text-anchor="middle" fill="#64748b" font-size="8">:8030 V6 Agentic · 11 agents · Self-Heal</text>
  <rect x="700" y="200" width="130" height="32" rx="6" fill="#1f2937" stroke="#4b5563" stroke-width="0.8"/>
  <text x="765" y="217" text-anchor="middle" fill="#9ca3af" font-size="9">logos_server :8080</text>
  <text x="765" y="228" text-anchor="middle" fill="#64748b" font-size="7">Django (Legacy)</text>

  <!-- Arrow: API → Orchestration -->
  <path d="M255,235 C255,260 200,260 200,280" fill="none" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="210" y="260" fill="#8b5cf6" font-size="8">select agents</text>
  <path d="M290,235 C350,260 400,260 420,280" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="340" y="266" fill="#10b981" font-size="8">JSON-RPC/SSE</text>

  <!-- ═══ Layer 4: Orchestration ═══ -->
  <rect x="20" y="272" width="840" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="290" fill="#64748b" font-size="9" font-weight="600">ORCHESTRATION</text>

  <rect x="60" y="294" width="155" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="137" y="311" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">🧠 Ontology</text>
  <text x="137" y="325" text-anchor="middle" fill="#64748b" font-size="7.5">GNN + RL + KG + LLM selection</text>

  <rect x="250" y="290" width="200" height="44" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="350" y="308" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">🔧 ACP Server</text>
  <text x="350" y="322" text-anchor="middle" fill="#64748b" font-size="8">:8888 · 50+ agents · hot_register · call_agent()</text>

  <rect x="490" y="294" width="145" height="38" rx="6" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="562" y="311" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">📦 logosai SDK</text>
  <text x="562" y="325" text-anchor="middle" fill="#64748b" font-size="7.5">LogosAIAgent · Evolution · LLM</text>

  <rect x="670" y="294" width="140" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="740" y="311" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">🗳️ Debate System</text>
  <text x="740" y="325" text-anchor="middle" fill="#64748b" font-size="7.5">5-phase agent negotiation</text>

  <!-- Connections within orchestration -->
  <line x1="215" y1="313" x2="250" y2="313" stroke="#10b981" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="450" y1="313" x2="490" y2="313" stroke="#34d399" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="460" y="309" fill="#34d399" font-size="7">extends</text>

  <!-- Arrow: ACP → Agents -->
  <path d="M280,334 C240,360 170,370 170,382" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M350,334 C350,360 400,370 400,382" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M420,334 C460,360 630,370 630,382" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="290" y="362" fill="#d97706" font-size="8">process(query) — parallel execution</text>

  <!-- ═══ Layer 5: Agents ═══ -->
  <rect x="20" y="375" width="840" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="30" y="393" fill="#64748b" font-size="9" font-weight="600">AGENTS (50+)</text>

  <rect x="55" y="395" width="230" height="30" rx="6" fill="#422006" stroke="#d97706" stroke-width="1"/>
  <text x="170" y="413" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🔍 Core Agents (30+)</text>
  <text x="170" y="423" text-anchor="middle" fill="#92400e" font-size="7">internet · analysis · code · RAG · translate · writing</text>

  <rect x="310" y="395" width="210" height="30" rx="6" fill="#422006" stroke="#d97706" stroke-width="1"/>
  <text x="415" y="413" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🖥️ Desktop Agents (5)</text>
  <text x="415" y="423" text-anchor="middle" fill="#92400e" font-size="7">Gmail · KakaoTalk · Notion · WhatsApp · AutoReport</text>

  <rect x="545" y="395" width="275" height="30" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="682" y="413" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🏗️ FORGE V6 Pipeline (11 agents)</text>
  <text x="682" y="423" text-anchor="middle" fill="#92400e" font-size="7">Analyzer → Decomposer → Strategy → CodeGen → Debate → Heal → Test</text>

  <!-- ═══ Layer 6: Self-Evolution ═══ -->
  <rect x="20" y="450" width="840" height="155" rx="8" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="30" y="468" fill="#fca5a5" font-size="9" font-weight="600">SELF-EVOLUTION LOOP</text>
  <text x="850" y="468" text-anchor="end" fill="#7f1d1d" font-size="8" font-style="italic">Fully autonomous — no human intervention required</text>

  <!-- Evolution boxes -->
  <rect x="45" y="480" width="150" height="42" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="498" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">📋 FailureLogger</text>
  <text x="120" y="512" text-anchor="middle" fill="#7f1d1d" font-size="7.5">Auto-trigger at 30% failure rate</text>

  <rect x="225" y="480" width="150" height="42" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="300" y="498" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">🔍 GapDetector</text>
  <text x="300" y="512" text-anchor="middle" fill="#7f1d1d" font-size="7.5">LLM capability gap analysis</text>

  <rect x="405" y="480" width="150" height="42" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="498" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🔗 ForgeBridge</text>
  <text x="480" y="512" text-anchor="middle" fill="#92400e" font-size="7.5">WebSocket → FORGE V6</text>

  <rect x="585" y="480" width="130" height="42" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="650" y="498" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="600">🛡️ Confidence</text>
  <text x="650" y="512" text-anchor="middle" fill="#6b21a8" font-size="7.5">≥0.95 auto / &lt;0.95 review</text>

  <rect x="745" y="480" width="100" height="42" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="795" y="498" text-anchor="middle" fill="#6ee7b7" font-size="9.5" font-weight="600">🚀 Deploy</text>
  <text x="795" y="512" text-anchor="middle" fill="#065f46" font-size="7.5">hot_register</text>

  <!-- Evolution arrows (left to right) -->
  <line x1="195" y1="501" x2="225" y2="501" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="375" y1="501" x2="405" y2="501" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="555" y1="501" x2="585" y2="501" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <line x1="715" y1="501" x2="745" y2="501" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ForgeBridge → FORGE API (upward) -->
  <path d="M480,480 C480,460 555,445 555,235" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-amber)"/>
  <text x="520" y="450" fill="#d97706" font-size="7" transform="rotate(-90 520 450)">generate / improve</text>

  <!-- hot_register → ACP (upward) -->
  <path d="M795,480 C795,440 830,400 830,350 C830,340 450,340 450,334" fill="none" stroke="#10b981" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>

  <!-- Feedback loop arrow -->
  <path d="M350,425 C350,445 120,455 120,480" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="200" y="450" fill="#ef4444" font-size="7">failure data</text>

  <!-- Feedback loop: deploy → ACP (back to agent pool) -->
  <text x="830" y="545" text-anchor="end" fill="#10b981" font-size="8">↑ New agent permanently available</text>

  <!-- Self-Evolution summary label -->
  <rect x="200" y="545" width="480" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="440" y="562" text-anchor="middle" fill="#94a3b8" font-size="9">
    Self-Growing (gap → new agent) · Self-Healing (3-stage fix) · Self-Evaluation (5-dim scoring)
  </text>

  <!-- ═══ External Dependencies ═══ -->
  <text x="30" y="600" fill="#475569" font-size="8.5">
    <tspan font-weight="600" fill="#64748b">Dependencies: </tspan>
    <tspan fill="#475569">PostgreSQL · Elasticsearch · Gemini API · Tavily · Telegram Bot · macOS Accessibility + Peekaboo</tspan>
  </text>
</svg>
