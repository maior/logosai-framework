<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
    <marker id="a-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <marker id="a-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
    <marker id="a-v" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="a-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
  </defs>

  <rect width="880" height="420" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Self-Evolution Flow — Agents That Fix Themselves</text>
  <text x="440" y="48" text-anchor="middle" fill="#64748b" font-size="10">Failure detection → FORGE improvement → zero-downtime deployment → continuous monitoring</text>

  <!-- ═══ Phase 1: Runtime ═══ -->
  <rect x="20" y="65" width="250" height="150" rx="8" fill="#0f2a1e" stroke="#064e3b" stroke-width="0.8"/>
  <text x="32" y="82" fill="#10b981" font-size="9" font-weight="600">RUNTIME</text>

  <rect x="50" y="92" width="120" height="36" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="110" y="113" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">⚙️ Agent runs</text>

  <rect x="40" y="148" width="75" height="30" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="77" y="167" text-anchor="middle" fill="#6ee7b7" font-size="9">✅ Success</text>

  <rect x="145" y="148" width="75" height="30" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="182" y="167" text-anchor="middle" fill="#fca5a5" font-size="9">❌ Failure</text>

  <line x1="85" y1="128" x2="77" y2="148" stroke="#10b981" stroke-width="1.2" marker-end="url(#a-g)"/>
  <line x1="135" y1="128" x2="182" y2="148" stroke="#ef4444" stroke-width="1.2" marker-end="url(#a-r)"/>

  <!-- ═══ Phase 2: Detection ═══ -->
  <rect x="290" y="65" width="250" height="150" rx="8" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="302" y="82" fill="#ef4444" font-size="9" font-weight="600">DETECTION</text>

  <rect x="310" y="92" width="120" height="36" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="370" y="107" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">📋 FailureLogger</text>
  <text x="370" y="120" text-anchor="middle" fill="#7f1d1d" font-size="7">pattern analysis</text>

  <rect x="310" y="148" width="100" height="30" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="167" text-anchor="middle" fill="#fca5a5" font-size="9">📊 Rate &gt;30%?</text>

  <rect x="430" y="148" width="95" height="30" rx="6" fill="#1f2937" stroke="#4b5563" stroke-width="0.8"/>
  <text x="477" y="162" text-anchor="middle" fill="#9ca3af" font-size="8">🔒 Circuit</text>
  <text x="477" y="173" text-anchor="middle" fill="#6b7280" font-size="7">60min cooldown</text>

  <line x1="370" y1="128" x2="370" y2="148" stroke="#ef4444" stroke-width="1.2" marker-end="url(#a-r)"/>
  <line x1="410" y1="163" x2="430" y2="163" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="420" y="158" fill="#6b7280" font-size="7">check</text>

  <!-- Arrow: Failure → FailureLogger -->
  <line x1="220" y1="163" x2="310" y2="110" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="260" y="130" fill="#ef4444" font-size="7">log_call()</text>

  <!-- ═══ Phase 3: FORGE ═══ -->
  <rect x="560" y="65" width="300" height="150" rx="8" fill="#1a1005" stroke="#422006" stroke-width="0.8"/>
  <text x="572" y="82" fill="#f59e0b" font-size="9" font-weight="600">FORGE V6</text>

  <rect x="580" y="92" width="120" height="36" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="107" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🔗 ForgeBridge</text>
  <text x="640" y="120" text-anchor="middle" fill="#92400e" font-size="7">WebSocket client</text>

  <rect x="720" y="92" width="120" height="36" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="780" y="107" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">🏗️ V6 Pipeline</text>
  <text x="780" y="120" text-anchor="middle" fill="#92400e" font-size="7">8-stage · 11 agents</text>

  <rect x="580" y="148" width="120" height="30" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="167" text-anchor="middle" fill="#fcd34d" font-size="9">🩺 CodeImprover</text>

  <rect x="720" y="148" width="120" height="30" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="780" y="162" text-anchor="middle" fill="#fcd34d" font-size="9">🧪 Self-Healing</text>
  <text x="780" y="173" text-anchor="middle" fill="#92400e" font-size="7">rule · LLM · pattern</text>

  <!-- Arrows: Rate → ForgeBridge -->
  <path d="M410,163 C450,163 530,110 580,110" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a-a)"/>
  <text x="490" y="125" fill="#f59e0b" font-size="7">&gt;30% failures</text>

  <!-- FORGE internal -->
  <line x1="700" y1="110" x2="720" y2="110" stroke="#f59e0b" stroke-width="1" marker-end="url(#a-a)"/>
  <line x1="640" y1="128" x2="640" y2="148" stroke="#f59e0b" stroke-width="1" marker-end="url(#a-a)"/>
  <line x1="700" y1="163" x2="720" y2="163" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- ═══ Phase 4: Deployment ═══ -->
  <rect x="20" y="240" width="840" height="80" rx="8" fill="#0f1a2e" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="32" y="258" fill="#3b82f6" font-size="9" font-weight="600">DEPLOYMENT</text>

  <rect x="140" y="262" width="150" height="40" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="215" y="280" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">🛡️ Confidence Gate</text>
  <text x="215" y="294" text-anchor="middle" fill="#6b21a8" font-size="8">≥0.95 auto · &lt;0.95 review</text>

  <rect x="370" y="262" width="150" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="445" y="280" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">🚀 hot_register</text>
  <text x="445" y="294" text-anchor="middle" fill="#065f46" font-size="8">Zero-downtime deploy</text>

  <rect x="600" y="262" width="150" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="675" y="280" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">✨ Agent Live!</text>
  <text x="675" y="294" text-anchor="middle" fill="#065f46" font-size="8">Serves traffic immediately</text>

  <!-- Arrows -->
  <path d="M640,178 C640,220 215,220 215,262" fill="none" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a-v)"/>
  <text x="430" y="225" fill="#8b5cf6" font-size="8">validated result</text>

  <line x1="290" y1="282" x2="370" y2="282" stroke="#10b981" stroke-width="1.5" marker-end="url(#a-g)"/>
  <text x="330" y="275" fill="#10b981" font-size="7">approved</text>

  <line x1="520" y1="282" x2="600" y2="282" stroke="#10b981" stroke-width="1.5" marker-end="url(#a-g)"/>
  <text x="555" y="275" fill="#10b981" font-size="7">registered</text>

  <!-- ═══ Phase 5: Feedback Loop ═══ -->
  <rect x="20" y="340" width="840" height="65" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.8"/>
  <text x="32" y="358" fill="#3b82f6" font-size="9" font-weight="600">FEEDBACK LOOP</text>

  <rect x="250" y="355" width="380" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="440" y="377" text-anchor="middle" fill="#94a3b8" font-size="10">
    🔄 New agent calls logged → performance tracked → failures trigger next cycle
  </text>

  <!-- Loop arrows -->
  <path d="M675,302 C750,330 750,375 630,375" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a-b)"/>
  <path d="M250,375 C120,375 110,250 110,178 C110,178 145,163 145,148" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 3"/>

  <!-- The big loop label -->
  <text x="50" y="300" fill="#3b82f6" font-size="8" font-weight="600" opacity="0.7">Continuous</text>
  <text x="50" y="312" fill="#3b82f6" font-size="8" font-weight="600" opacity="0.7">improvement</text>
  <text x="50" y="324" fill="#3b82f6" font-size="8" font-weight="600" opacity="0.7">loop ↺</text>
</svg>
