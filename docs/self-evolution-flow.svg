<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 370" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="a-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
    <marker id="a-v" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="a-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
  </defs>

  <rect width="880" height="370" rx="12" fill="#0f172a"/>

  <text x="440" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Self-Evolution — Agents That Improve Themselves</text>
  <text x="440" y="48" text-anchor="middle" fill="#64748b" font-size="10">logosai.evolution · FailureLogger · GapDetector · hot_register</text>

  <!-- ═══ Phase 1: Runtime ═══ -->
  <rect x="20" y="65" width="200" height="130" rx="8" fill="#0f2a1e" stroke="#064e3b" stroke-width="0.8"/>
  <text x="32" y="82" fill="#10b981" font-size="9" font-weight="600">RUNTIME</text>

  <rect x="45" y="92" width="140" height="36" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="115" y="113" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">⚙️ Agent executes</text>

  <rect x="40" y="148" width="70" height="28" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="75" y="166" text-anchor="middle" fill="#6ee7b7" font-size="9">✅ OK</text>

  <rect x="130" y="148" width="70" height="28" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="166" text-anchor="middle" fill="#fca5a5" font-size="9">❌ Fail</text>

  <line x1="85" y1="128" x2="75" y2="148" stroke="#10b981" stroke-width="1.2" marker-end="url(#a-g)"/>
  <line x1="145" y1="128" x2="165" y2="148" stroke="#ef4444" stroke-width="1.2" marker-end="url(#a-r)"/>

  <!-- ═══ Phase 2: Detection ═══ -->
  <rect x="240" y="65" width="200" height="130" rx="8" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="252" y="82" fill="#ef4444" font-size="9" font-weight="600">DETECTION</text>

  <rect x="260" y="92" width="160" height="36" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="107" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">📋 FailureLogger</text>
  <text x="340" y="120" text-anchor="middle" fill="#7f1d1d" font-size="7.5">Pattern analysis · 500 recent calls</text>

  <rect x="260" y="148" width="100" height="28" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="310" y="166" text-anchor="middle" fill="#fca5a5" font-size="9">Rate &gt;30%?</text>

  <rect x="375" y="148" width="55" height="28" rx="6" fill="#1f2937" stroke="#4b5563" stroke-width="0.8"/>
  <text x="402" y="166" text-anchor="middle" fill="#9ca3af" font-size="8">🔒 60m</text>

  <line x1="340" y1="128" x2="340" y2="148" stroke="#ef4444" stroke-width="1.2" marker-end="url(#a-r)"/>
  <line x1="360" y1="162" x2="375" y2="162" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Fail → Logger -->
  <line x1="200" y1="162" x2="260" y2="110" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="225" y="130" fill="#ef4444" font-size="7">log_call()</text>

  <!-- ═══ Phase 3: Improvement ═══ -->
  <rect x="460" y="65" width="200" height="130" rx="8" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="472" y="82" fill="#ef4444" font-size="9" font-weight="600">IMPROVEMENT</text>

  <rect x="480" y="92" width="160" height="36" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="560" y="107" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">🔍 GapDetector</text>
  <text x="560" y="120" text-anchor="middle" fill="#7f1d1d" font-size="7.5">LLM: missing capabilities?</text>

  <rect x="480" y="148" width="160" height="36" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="560" y="163" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="600">🛡️ Confidence Gate</text>
  <text x="560" y="177" text-anchor="middle" fill="#6b21a8" font-size="7.5">≥0.95 auto-deploy · &lt;0.95 human review</text>

  <line x1="560" y1="128" x2="560" y2="148" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#a-v)"/>

  <!-- Rate → GapDetector -->
  <path d="M360,162 C400,162 440,110 480,110" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="415" y="125" fill="#ef4444" font-size="7">&gt;30%</text>

  <!-- ═══ Phase 4: Deploy ═══ -->
  <rect x="680" y="65" width="180" height="130" rx="8" fill="#0f2a1e" stroke="#064e3b" stroke-width="0.8"/>
  <text x="692" y="82" fill="#10b981" font-size="9" font-weight="600">DEPLOYMENT</text>

  <rect x="700" y="96" width="140" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="770" y="114" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">🚀 hot_register</text>
  <text x="770" y="128" text-anchor="middle" fill="#065f46" font-size="7.5">Dynamic load · agents.json · zero downtime</text>

  <rect x="710" y="152" width="120" height="30" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="770" y="172" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">✨ Agent Live!</text>

  <line x1="770" y1="136" x2="770" y2="152" stroke="#10b981" stroke-width="1.2" marker-end="url(#a-g)"/>

  <!-- Confidence → hot_register -->
  <line x1="640" y1="166" x2="700" y2="116" stroke="#10b981" stroke-width="1.5" marker-end="url(#a-g)"/>
  <text x="660" y="133" fill="#10b981" font-size="7">approved</text>

  <!-- ═══ Feedback Loop ═══ -->
  <rect x="20" y="215" width="840" height="55" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="32" y="233" fill="#3b82f6" font-size="9" font-weight="600">FEEDBACK LOOP</text>

  <rect x="200" y="230" width="480" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="440" y="249" text-anchor="middle" fill="#94a3b8" font-size="9.5">🔄 New agent monitored → calls logged → failures trigger next improvement cycle</text>

  <!-- Loop arrows -->
  <path d="M770,182 C800,210 800,245 680,245" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a-b)"/>
  <path d="M200,245 C80,245 60,210 60,195 C60,195 130,176 130,176" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a-b)"/>

  <!-- ═══ Evolution Capabilities ═══ -->
  <rect x="20" y="290" width="840" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="32" y="308" fill="#64748b" font-size="9" font-weight="600">EVOLUTION CAPABILITIES (logosai.evolution)</text>

  <rect x="55" y="315" width="230" height="28" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="0.8"/>
  <text x="170" y="333" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">🌱 Self-Growing — gap detection → new capabilities</text>

  <rect x="310" y="315" width="250" height="28" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="435" y="333" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">🩺 Self-Healing — detect errors → auto-fix (3-stage)</text>

  <rect x="585" y="315" width="245" height="28" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="707" y="333" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">📊 Self-Evaluation — 5-dimensional quality scoring</text>

  <!-- Safety -->
  <text x="440" y="365" text-anchor="middle" fill="#475569" font-size="8.5">
    <tspan font-weight="600" fill="#64748b">Safety: </tspan>
    <tspan>Circuit Breaker (60min cooldown) · Confidence Gates (4-tier) · Fix History (cycle prevention) · Backup before deploy</tspan>
  </text>
</svg>
